name: Auto Update Skills

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone skills source
        run: git clone --depth 1 https://github.com/openclaw/skills.git /tmp/skills-source

      - name: Run auto-update
        run: python scripts/auto-update.py --source-dir /tmp/skills-source/skills --no-push

      - name: Regenerate catalog
        run: python scripts/update-catalog.py

      - name: Commit and push
        run: |
          git config user.name "CryptoSkill Bot"
          git config user.email "bot@cryptoskill.app"
          git add -A
          if git diff --cached --quiet; then
            echo "No new skills found"
          else
            git commit -m "Auto-update: $(date +%Y-%m-%d)"
            git push
          fi
